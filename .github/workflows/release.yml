name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g., v0.1.17

jobs:
  build-and-upload:
    name: Build for ${{ matrix.os }} - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: icnow-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: icnow-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: icnow-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: icnow-windows-amd64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/icnow ${{ matrix.artifact_name }}

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/icnow.exe ${{ matrix.artifact_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
