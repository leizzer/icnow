name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.val }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-dist --version 0.17.0
      - id: plan
        run: |
          cargo dist plan --output-format json > dist-plan.json
          echo "val=$(jq -c . dist-plan.json)" >> $GITHUB_OUTPUT

  build:
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo install cargo-dist --version 0.17.0
      - run: cargo dist build --target ${{ matrix.target }} --output-format json
      - uses: actions/upload-artifact@v7
        with:
          name: dist-artifacts-${{ matrix.target }}
          path: target/distrib/

  release:
    needs: [plan, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          path: target/distrib/
          merge-multiple: true
      - run: ls -R target/distrib/
      - uses: softprops/action-gh-release@v3
        with:
          files: target/distrib/*
