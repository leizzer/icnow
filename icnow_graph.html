        document.addEventListener('DOMContentLoaded', function() {
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: window.GRAPH_ELEMENTS,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(name)',
                            'color': '#ffffff',
                            'text-outline-color': '#222',
                            'text-outline-width': 2,
                            'font-size': '10px',
                            'font-family': 'sans-serif',
                            'text-valign': 'bottom',
                            'text-margin-y': 5,
                            'background-color': '#9C27B0',
                            'width': 25,
                            'height': 25,
                            'transition-property': 'background-color, line-color, target-arrow-color',
                            'transition-duration': '0.3s'
                        }
                    },
                    {
                        selector: 'node[label = "File"]',
                        style: {
                            'background-color': '#4DB8FF',
                            'shape': 'round-rectangle',
                            'width': 35,
                            'height': 35
                        }
                    },
                    {
                        selector: 'node[label = "Function"]',
                        style: {
                            'background-color': '#FF6B6B',
                            'shape': 'ellipse'
                        }
                    },
                    {
                        selector: 'node[label = "Class"]',
                        style: {
                            'background-color': '#4CAF50',
                            'shape': 'hexagon',
                            'width': 35,
                            'height': 30
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 1.5,
                            'line-color': '#555555',
                            'target-arrow-color': '#555555',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'opacity': 0.6,
                            'label': 'data(label)',
                            'font-size': '8px',
                            'color': '#888',
                            'text-rotation': 'autorotate',
                            'text-background-opacity': 1,
                            'text-background-color': '#121212',
                            'text-background-padding': 2
                        }
                    },
                    {
                        selector: 'edge[label = "CONTAINS"]',
                        style: {
                            'line-color': '#4DB8FF',
                            'target-arrow-color': '#4DB8FF',
                            'opacity': 0.3,
                            'width': 1,
                            'line-style': 'dotted'
                        }
                    },
                    {
                        selector: 'edge[label = "CALLS"]',
                        style: {
                            'line-color': '#FF6B6B',
                            'target-arrow-color': '#FF6B6B',
                            'width': 2
                        }
                    },
                    {
                        selector: 'edge[label = "IMPORTS"]',
                        style: {
                            'line-color': '#4CAF50',
                            'target-arrow-color': '#4CAF50',
                            'width': 2,
                            'line-style': 'dashed'
                        }
                    }
                ],
                layout: {
                    name: 'fcose',
                    quality: 'default',
                    randomize: true,
                    animate: true,
                    animationDuration: 1000,
                    fit: true,
                    padding: 50,
                    nodeDimensionsIncludeLabels: true
                }
            });

            // Interaction styles
            cy.on('tap', 'node', function(evt){
                var node = evt.target;
                
                // Reset all
                cy.elements().style({ 'opacity': 0.1 });
                
                // Highlight connected neighborhood
                node.neighborhood().add(node).style({ 'opacity': 1 });
            });

            cy.on('tap', function(evt){
                if(evt.target === cy){
                    cy.elements().style({ 'opacity': 1 });
                }
            });
        });
    </script>
