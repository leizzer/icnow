[package]
name = "icnow"
version = "0.1.0"
edition = "2024"

[dependencies]
graphqlite = "0.4.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rmcp = { version = "1.7.0", features = ["server", "transport-io", "macros"] }
tokio = { version = "1.52.3", features = ["full"] }
schemars = { version = "1.0" }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
